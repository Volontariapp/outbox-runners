name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    name: Build & Lint (${{ matrix.outbox }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        outbox: [outbox-user, outbox-social, outbox-post, outbox-event]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        uses: ./ci-tools/.github/actions/setup-node-yarn
        with:
          node-version: '24.14.0'
          cache: 'yarn'
          cache-dependency-path: '${{ matrix.outbox }}/yarn.lock'
      
      - name: Install dependencies
        working-directory: ${{ matrix.outbox }}
        run: yarn install

      - name: Lint
        working-directory: ${{ matrix.outbox }}
        run: yarn lint

      - name: Build
        working-directory: ${{ matrix.outbox }}
        run: yarn build

  deploy:
    name: Update Deploy Submodule
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Deploy Repository
        uses: actions/checkout@v4
        with:
          repository: Volontariapp/deploy
          token: ${{ secrets.ORG_REPO_TOKEN }}
          path: deploy

      - name: Update submodule
        env:
          ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
          SERVICE: "outbox-runners"
          SERVICE_SHA: "${{ github.sha }}"
        run: |
          cd deploy
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${ORG_REPO_TOKEN}@github.com/".insteadOf "git@github.com:"
          
          git submodule update --init "$SERVICE"
          git -C "$SERVICE" fetch origin "$SERVICE_SHA"
          git -C "$SERVICE" checkout "$SERVICE_SHA"
          
          if ! git diff --quiet "$SERVICE"; then
            git add "$SERVICE"
            git commit -m "chore(deploy): update $SERVICE submodule to ${SERVICE_SHA:0:7}"
            git pull --rebase origin main && git push origin main
          else
            echo "No changes to deploy"
          fi

  docker:
    name: Build & Push Docker Image (${{ matrix.outbox }})
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        outbox: [outbox-user, outbox-social, outbox-post, outbox-event]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.outbox }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
          flavor: |
            latest=false

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.outbox }}
          file: ./${{ matrix.outbox }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
